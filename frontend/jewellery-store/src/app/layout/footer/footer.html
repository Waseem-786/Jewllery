<footer class="footer">

  <div class="container footer-inner">

    <!-- Brand -->
    <div class="brand">
      <h2>AURUM</h2>
      <p>Timeless jewellery crafted with precision and elegance — for the moments worth keeping.</p>

      <form class="newsletter" (submit)="$event.preventDefault()">
        <label>Receive our private letter</label>
        <div class="newsletter-row">
          <input type="email" placeholder="Your email address" required>
          <button type="submit" aria-label="Subscribe">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5">
              <line x1="4" y1="12" x2="20" y2="12"/>
              <polyline points="14 6 20 12 14 18"/>
            </svg>
          </button>
        </div>
      </form>
    </div>

    <!-- Links -->
    <div class="links">

      <div>
        <h4>Maison</h4>
        <a routerLink="/about">About Us</a>
        <a>The Atelier</a>
        <a>Craftsmanship</a>
      </div>

      <div>
        <h4>Shop</h4>
        <a routerLink="/shop">All Pieces</a>
        <a>New Arrivals</a>
        <a>Collections</a>
      </div>

      <div>
        <h4>Care</h4>
        <a>Contact</a>
        <a>Shipping</a>
        <a>Returns</a>
        <a>Privacy</a>
      </div>

    </div>

  </div>

  <div class="container footer-bottom">
    <p>© 2026 AURUM. All rights reserved.</p>
    <div class="socials">
      <a aria-label="Instagram">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="3" width="18" height="18" rx="4"/>
          <circle cx="12" cy="12" r="4"/>
          <circle cx="17.5" cy="6.5" r="1" fill="currentColor"/>
        </svg>
      </a>
      <a aria-label="Pinterest">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="12" cy="12" r="9"/>
          <path d="M11 7c3 0 5 2 5 5s-2 4-4 4c-1 0-2-1-2-2"/>
          <line x1="11" y1="9" x2="9" y2="20"/>
        </svg>
      </a>
      <a aria-label="Facebook">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M14 8h3V4h-3a4 4 0 0 0-4 4v3H7v4h3v6h4v-6h3l1-4h-4V8a1 1 0 0 1 1-1z"/>
        </svg>
      </a>
    </div>
  </div>

</footer>
