<section class="auth">

  <div class="auth-box">

    <span class="brand">AURUM</span>

    <h2>Welcome Back</h2>
    <p class="subtitle">Sign in to continue your luxury experience</p>

    <!-- FORM -->
    <div class="field" [class.has-error]="fieldErrors().email">
      <input type="email" placeholder="Email Address"
             [(ngModel)]="email" name="email"
             autocomplete="email" required />
      @if (fieldErrors().email) { <span class="hint">{{ fieldErrors().email }}</span> }
    </div>

    <div class="field" [class.has-error]="fieldErrors().password">
      <input type="password" placeholder="Password"
             [(ngModel)]="password" name="password"
             autocomplete="current-password" required
             (keyup.enter)="login()" />
      @if (fieldErrors().password) { <span class="hint">{{ fieldErrors().password }}</span> }
    </div>

    <button class="primary-btn" type="button" (click)="login()" [disabled]="busy()">
      {{ busy() ? 'Signing in…' : 'Sign In' }}
    </button>

    <p class="extra">
      Don’t have an account?
      <a class="link" routerLink="/signup" [queryParams]="signupLink">Register</a>
    </p>

  </div>

</section>
